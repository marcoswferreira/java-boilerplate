apiVersion: apps/v1
kind: Deployment
metadata:
  name: boilerplate-api
  labels:
    app: boilerplate-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boilerplate-api
  template:
    metadata:
      labels:
        app: boilerplate-api
    spec:
      containers:
        - name: boilerplate-api
          image: boilerplate-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          # Resource requests and limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # Liveness probe — restarts the pod if the app is stuck
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3

          # Readiness probe — removes pod from service until ready
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          envFrom:
            - configMapRef:
                name: boilerplate-config
            - secretRef:
                name: boilerplate-secrets

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

      terminationGracePeriodSeconds: 60
