spring:
  application:
    name: boilerplate-api

  # Disable Spring Boot's auto Flyway — we manage it manually (FlywayTenantMigrationConfig)
  flyway:
    enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/boilerplate}
    username: ${DB_USER:boilerplate}
    password: ${DB_PASS:boilerplate}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      pool-name: BoilerplateHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      retries: 3
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:boilerplate-api}
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        session.timeout.ms: 30000

# JWT Configuration (validated at startup)
app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-to-a-long-secret-key-of-at-least-32-chars}
    access-token-ttl-ms: ${JWT_ACCESS_TOKEN_TTL_MS:900000}      # 15 minutes
    refresh-token-ttl-ms: ${JWT_REFRESH_TOKEN_TTL_MS:604800000} # 7 days
    issuer: boilerplate-api

  kafka:
    default-topic: boilerplate.domain.events
    topics:
      user.created: boilerplate.user.events

  outbox:
    relay:
      interval-ms: ${OUTBOX_RELAY_INTERVAL_MS:5000}

# Spring Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI / Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.boilerplate: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
# Local profile overrides
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/boilerplate_local
    username: boilerplate
    password: boilerplate

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.boilerplate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# Dev profile
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.boilerplate: DEBUG

---
# Staging profile
spring:
  config:
    activate:
      on-profile: staging

logging:
  level:
    com.boilerplate: INFO
    root: WARN

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.boilerplate: INFO
